function Dropdown({label,options,value,onChange,placeholder,style:st}) {
  const [open,setOpen]=useState(false);
  const ref=React.useRef();
  React.useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  return (
    <div ref={ref} style={{position:"relative",...st}}>
      <div onClick={()=>setOpen(!open)} style={{
        padding:"6px 28px 6px 8px",fontSize:12,border:"1px solid #d5d2ca",borderRadius:4,background:"#fff",cursor:"pointer",
        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:value?s.dark:s.muted,position:"relative"
      }}>
        {value||placeholder||"-"}
        <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:10,color:s.muted}}>▼</span>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:100,background:"#fff",border:"1px solid #d5d2ca",borderRadius:4,maxHeight:200,overflowY:"auto",boxShadow:"0 4px 12px rgba(0,0,0,0.1)"}}>
          <div onClick={()=>{onChange("");setOpen(false)}} style={{padding:"6px 10px",fontSize:12,cursor:"pointer",background:!value?"#e6f0fa":"",color:!value?s.link:s.dark}}
            onMouseEnter={e=>e.currentTarget.style.background="#f5f3ee"} onMouseLeave={e=>e.currentTarget.style.background=!value?"#e6f0fa":""}>-</div>
          {options.map(o=>(
            <div key={o} onClick={()=>{onChange(o);setOpen(false)}} style={{padding:"6px 10px",fontSize:12,cursor:"pointer",borderTop:"1px solid #f0ede6"}}
              onMouseEnter={e=>e.currentTarget.style.background="#f5f3ee"} onMouseLeave={e=>e.currentTarget.style.background=value===o?"#e6f0fa":""}>{o}</div>
          ))}
        </div>
      )}
    </div>
  );
}

function MultiDropdown({label,options,values,onChange,placeholder,style:st}) {
  const [open,setOpen]=useState(false);
  const ref=React.useRef();
  React.useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  const toggle=(o)=>{
    if(values.includes(o)) onChange(values.filter(v=>v!==o));
    else onChange([...values,o]);
  };
  return (
    <div ref={ref} style={{position:"relative",...st}}>
      <div onClick={()=>setOpen(!open)} style={{
        padding:"6px 28px 6px 8px",fontSize:12,border:"1px solid #d5d2ca",borderRadius:4,background:"#fff",cursor:"pointer",
        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:values.length?s.dark:s.muted,position:"relative",minHeight:30
      }}>
        {values.length?values.join(", "):(placeholder||"- 入力または選択（複数選択可能）")}
        {values.length>0&&<span onClick={e=>{e.stopPropagation();onChange([])}} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:14,color:s.muted,cursor:"pointer"}}>×</span>}
      </div>
      {open&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:100,background:"#fff",border:"1px solid #d5d2ca",borderRadius:4,maxHeight:200,overflowY:"auto",boxShadow:"0 4px 12px rgba(0,0,0,0.1)"}}>
          {options.map(o=>(
            <div key={o} onClick={()=>toggle(o)} style={{padding:"6px 10px",fontSize:12,cursor:"pointer",borderTop:"1px solid #f0ede6",background:values.includes(o)?"#e6f0fa":"",display:"flex",alignItems:"center",gap:6}}
              onMouseEnter={e=>{if(!values.includes(o))e.currentTarget.style.background="#f5f3ee"}} onMouseLeave={e=>{if(!values.includes(o))e.currentTarget.style.background=""}}>
              <span style={{width:14,height:14,border:"1px solid #d5d2ca",borderRadius:3,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,background:values.includes(o)?s.link:"#fff",color:"#fff"}}>{values.includes(o)?"✓":""}</span>
              {o}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

            </div>

            <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>写真（クリックで拡大）</div>
            <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
              {DETAIL.photos.map((p,pi)=>(
                <div key={p.label} onClick={e=>{e.stopPropagation();setLightbox(pi)}} style={{
                  width:140,height:105,flexShrink:0,borderRadius:8,overflow:"hidden",
                  cursor:"pointer",position:"relative",border:`1px solid ${s.border}`,transition:"transform .15s"
                }} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.03)"} onMouseLeave={e=>e.currentTarget.style.transform=""}>
                  <img src={p.img} alt={p.label} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"4px 8px",
                    background:"linear-gradient(transparent,rgba(0,0,0,0.6))",
                    fontSize:11,color:"#fff",fontWeight:500}}>{p.label}</div>
                </div>
              ))}
            </div>

            <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>PRコメント</div>
            <div style={{fontSize:12,color:"#aaa",padding:"10px 12px",border:`1px solid ${s.border}`,borderRadius:8,background:"#fff",marginBottom:12}}>（未入力）</div>

          </div>

          <div style={{width:280,minWidth:280}}>
            <div style={{border:`1px solid ${s.border}`,borderRadius:10,padding:18,background:"#fff",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <div style={{fontSize:16,fontWeight:700}}>入札フォーム</div>
                {car.deadline&&<span style={{fontSize:11,padding:"4px 12px",background:s.dangerBg,color:s.accent,borderRadius:20,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  {car.deadline}締切
                </span>}
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:s.muted,marginBottom:4}}>下限金額</div>
                <input type="text" value={minPrice} onChange={e=>setMinPrice(e.target.value)}
                  style={{width:"100%",fontSize:14,padding:"8px 10px",border:`1px solid #d5d2ca`,borderRadius:6}} placeholder="円"/>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:s.muted,marginBottom:4}}>上限金額</div>
                <input type="text" value={maxPrice} onChange={e=>setMaxPrice(e.target.value)}
                  style={{width:"100%",fontSize:14,padding:"8px 10px",border:`1px solid #d5d2ca`,borderRadius:6}} placeholder="円"/>
              </div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:12,color:s.muted,marginBottom:4}}>メッセージ（任意）</div>
                <textarea value={message} onChange={e=>setMessage(e.target.value)}
                  style={{width:"100%",fontSize:12,padding:"8px 10px",border:`1px solid #d5d2ca`,borderRadius:6,minHeight:64,resize:"vertical",fontFamily:"inherit"}}
                  placeholder="400文字以内" maxLength={400}/>
              </div>
              <div style={{fontSize:11,color:s.muted,marginBottom:10}}>他に <strong style={{color:s.dark}}>0社</strong> が入札　{DETAIL.assessDate} 18:</div>
              <button onClick={()=>setBidDone(true)} style={{
                width:"100%",padding:"12px 0",fontSize:15,fontWeight:700,border:"none",borderRadius:8,cursor:"pointer",transition:"all .2s",
                background:bidDone?s.successBg:s.accent,color:bidDone?s.successText:"#fff"
              }}>{bidDone?"✓ 入札済み":"入札する"}</button>
              <div style={{fontSize:10,color:"#aaa",marginTop:8,lineHeight:1.6}}>入札受付期間中であれば、入札額は何度でも変更可能です。入札申込期限を過ぎるまで、出品者に入札額は開示されません。</div>
            </div>

            <div style={{border:`1px solid ${s.border}`,borderRadius:10,padding:16,background:"#fff",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>入札見送り設定</div>
              <div style={{fontSize:11,color:s.muted,marginBottom:8,lineHeight:1.5}}>この車両の入札を行わない場合の送りを設定してください。</div>
              <button style={{fontSize:12,padding:"6px 16px",border:`1px solid #d5d2ca`,borderRadius:6,background:"#fff",cursor:"pointer"}}>入札見送り</button>
            </div>

            <div style={{border:`1px solid ${s.border}`,borderRadius:10,padding:16,background:"#fff"}}>
              <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>入札のご注意</div>
              <div style={{fontSize:11,color:s.muted,lineHeight:1.7,marginBottom:12}}>入札額の上限を基準に、以下の通り入札できる金額に制限がございます。下記をご覧いただき、期限内での入札をお願いいたします。</div>
              <table style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
                <tbody>
                  {[
                    ["〜49万9,000円","20万円幅"],
                    ["50万〜99万9,000円","30万円幅"],
                    ["100万〜199万9,000円","40万円幅"],
                    ["200万〜299万9,000円","50万円幅"],
                    ["300万〜499万9,000円","100万円幅"],
                    ["500万円〜","150万円幅"],
                  ].map((r,i)=>(
                    <tr key={i} style={{borderBottom:i<5?`1px solid ${s.borderLight}`:"none"}}>
                      <td style={{padding:"6px 0",color:s.dark}}>{r[0]}</td>
                      <td style={{padding:"6px 0",textAlign:"right",color:s.muted}}>{r[1]}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      {lightbox!==null&&(
        <div onClick={()=>setLightbox(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
          <div style={{position:"relative",maxWidth:"90vw",maxHeight:"90vh"}} onClick={e=>e.stopPropagation()}>
            <img src={DETAIL.photos[lightbox].img.replace("w=400&h=300","w=1200&h=900")} alt={DETAIL.photos[lightbox].label}
              style={{maxWidth:"90vw",maxHeight:"80vh",objectFit:"contain",borderRadius:8,display:"block"}}/>
            <div style={{textAlign:"center",color:"#fff",fontSize:14,marginTop:10,fontWeight:500}}>{DETAIL.photos[lightbox].label}</div>
            <div style={{position:"absolute",top:-40,right:0,color:"#fff",fontSize:28,cursor:"pointer",fontWeight:300}} onClick={()=>setLightbox(null)}>×</div>
            {lightbox>0&&(
              <div onClick={()=>setLightbox(lightbox-1)} style={{position:"absolute",left:-50,top:"50%",transform:"translateY(-50%)",color:"#fff",fontSize:36,cursor:"pointer",padding:"10px"}}>‹</div>
            )}
            {lightbox<DETAIL.photos.length-1&&(
              <div onClick={()=>setLightbox(lightbox+1)} style={{position:"absolute",right:-50,top:"50%",transform:"translateY(-50%)",color:"#fff",fontSize:36,cursor:"pointer",padding:"10px"}}>›</div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [page,setPage]=useState("list");
  const [pattern,setPattern]=useState("A");
  const [selectedCar,setSelectedCar]=useState(null);

  const goDetail=(car)=>{setSelectedCar(car);setPage("detail");window.scrollTo(0,0);};

  if(page==="detail"&&selectedCar) {
    return <DetailPage car={selectedCar} onBack={()=>setPage("list")} onNavigate={(car)=>{setSelectedCar(car);window.scrollTo(0,0);}}/>;
  }
  return <ListPage pattern={pattern} setPattern={setPattern} onSelect={goDetail}/>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
